worker_processes  1;

error_log  "F:/random stuff/Anonymous Rights Protector/config/logs/error.log";

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_body_temp_path  "F:/random stuff/Anonymous Rights Protector/temp/client_body_temp";
    proxy_temp_path        "F:/random stuff/Anonymous Rights Protector/temp/proxy_temp";
    fastcgi_temp_path      "F:/random stuff/Anonymous Rights Protector/temp/fastcgi_temp";
    uwsgi_temp_path        "F:/random stuff/Anonymous Rights Protector/temp/uwsgi_temp";
    scgi_temp_path         "F:/random stuff/Anonymous Rights Protector/temp/scgi_temp";

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # Redirect root to the repository subdirectory for local testing
        location = / {
            return 301 /Anonymous-Rights-Protector/;
        }

        # Dashboard (Frontend) in subdirectory
        location /Anonymous-Rights-Protector/ {
            # Use root instead of alias to avoid common pitfalls with nested locations
            # Path will be root + location = F:/.../dist/Anonymous-Rights-Protector/
            # But our dist doesn't have that folder. 
            # So we use alias but keep it simple.
            alias  "F:/random stuff/Anonymous Rights Protector/dashboard/dist/";
            index  index.html;
            try_files $uri $uri/ /Anonymous-Rights-Protector/index.html;

            # Ensure .js files are served as application/javascript
            # This is critical for ES modules
            location ~* \.js$ {
                alias  "F:/random stuff/Anonymous Rights Protector/dashboard/dist/";
                # Match the file specifically within the alias
                if ($request_uri ~* "/Anonymous-Rights-Protector/(.*\.js)$") {
                    set $js_file $1;
                }
                # Fallback to standard handling if regex fails
                default_type application/javascript;
            }
        }

        # API / Socket.io (Backend)
        location /socket.io/ {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}
